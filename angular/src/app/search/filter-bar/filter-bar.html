<!-- Mobile summary: collapses the whole search into one row that opens the sheet. -->
<div class="filter-summary">
  <span class="summary-text">{{ summary() }}</span>
  <button type="button" class="edit-search" (click)="openSheet()">Edit search</button>
</div>

<form class="filter-bar" [class.sheet-open]="sheetOpen()" (ngSubmit)="submit()">
  <!-- Sheet header (mobile only): title + close. -->
  <div class="sheet-header">
    <span class="sheet-title">Edit search</span>
    <button type="button" class="sheet-close" aria-label="Close search" (click)="closeSheet()">✕</button>
  </div>

  <label class="field">
    <span>Location</span>
    <select (change)="onLocation($any($event.target).value)" required>
      <option value="" disabled selected>Select area</option>
      @for (area of areas(); track area.id) {
        <option [value]="area.id">{{ area.name }}</option>
      }
    </select>
  </label>

  <label class="field">
    <span>BHK</span>
    <select (change)="onBhk($any($event.target).value)">
      @for (opt of bhkOptions; track opt.value) {
        <option [value]="opt.value" [selected]="opt.value === bhk()">{{ opt.label }}</option>
      }
    </select>
  </label>

  <label class="field">
    <span>Budget min (₹)</span>
    <input type="number" min="0" inputmode="numeric"
           (input)="onBudgetMin($any($event.target).value)" placeholder="No min" />
  </label>

  <label class="field">
    <span>Budget max (₹)</span>
    <input type="number" min="0" inputmode="numeric"
           (input)="onBudgetMax($any($event.target).value)" placeholder="No max" />
  </label>

  <label class="field">
    <span>Furnishing</span>
    <select (change)="onFurnishing($any($event.target).value)">
      <option value="" [selected]="furnishing() === null">Any</option>
      @for (opt of furnishingOptions; track opt.value) {
        <option [value]="opt.value" [selected]="opt.value === furnishing()">{{ opt.label }}</option>
      }
    </select>
  </label>

  @if (activeFilterCount() > 0) {
    <span class="filter-badge">Filters · {{ activeFilterCount() }}</span>
  }

  <button type="submit" class="search-btn" [disabled]="!canSearch()">Search</button>

  <!-- Right-aligned list/map view toggle (FR-014). The map screen is deferred;
       this is the in-scope entry point only. -->
  <div class="view-toggle" role="group" aria-label="Results view">
    <button type="button" class="view-option"
            [class.active]="view() === 'list'"
            [attr.aria-pressed]="view() === 'list'"
            (click)="setView('list')">List</button>
    <button type="button" class="view-option"
            [class.active]="view() === 'map'"
            [attr.aria-pressed]="view() === 'map'"
            (click)="setView('map')">Map</button>
  </div>
</form>

@if (view() === 'map') {
  <p class="map-notice" role="status">Map view is coming soon. Showing the list for now.</p>
}
