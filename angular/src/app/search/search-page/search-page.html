<section class="search-page">
  <app-filter-bar
    [areas]="areas()"
    [sort]="criteria()?.sort ?? 'BEST_DEAL'"
    (search)="onSearch($event)" />

  @if (loading()) {
    <app-skeleton-state [count]="4" />
  } @else if (error(); as e) {
    <app-error-state [message]="e.message" (retry)="onRetry()" />
  } @else if (response(); as res) {
    <app-results-meta
      [count]="res.count"
      [dupCount]="res.dupCount"
      [sort]="res.sort"
      [sources]="res.sources"
      (sortChange)="onSortChange($event)" />

    @if (res.results.length > 0) {
      <p class="availability">Listings link out to their source; availability isn't guaranteed.</p>
      @for (group of res.results; track group.groupId) {
        <app-listing-card [group]="group" />
      }
    } @else {
      <app-empty-state />
    }
  }
</section>
